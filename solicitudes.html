<div id="page-solicitudes" class="page-section" style="display:none;">
  <div class="card-pro">
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-3">
      <h5 class="fw-bold m-0"><i class="bi bi-clipboard me-2"></i>Bandeja de Solicitudes</h5>
      <button class="btn btn-red btn-sm" onclick="cargarSolicitudes()"><i class="bi bi-arrow-clockwise"></i> Actualizar</button>
    </div>
    <div class="filter-group">
      <button class="btn-filter active" data-filter="all" onclick="filtrarSolicitudes('all')">Todas</button>
      <button class="btn-filter" data-filter="NUEVA" onclick="filtrarSolicitudes('NUEVA')">Pendientes</button>
      <button class="btn-filter" data-filter="REVISADA" onclick="filtrarSolicitudes('REVISADA')">Revisadas</button>
      <button class="btn-filter" data-filter="EN PROCESO" onclick="filtrarSolicitudes('EN PROCESO')">En Proceso</button>
      <button class="btn-filter" data-filter="CERRADO" onclick="filtrarSolicitudes('CERRADO')">Cerradas</button>
    </div>
    <div class="filter-group">
      <button class="btn-filter active" data-filter-area="all" onclick="filtrarSolicitudesArea('all')">Todas Áreas</button>
      <button class="btn-filter" data-filter-area="MECANICA" onclick="filtrarSolicitudesArea('MECANICA')">🔧 Mecánica</button>
      <button class="btn-filter" data-filter-area="CARROCERIA" onclick="filtrarSolicitudesArea('CARROCERIA')">🚗 Carrocería</button>
      <button class="btn-filter" data-filter-area="ELECTRICO" onclick="filtrarSolicitudesArea('ELECTRICO')">⚡ Eléctrico</button>
      <button class="btn-filter" data-filter-area="URF" onclick="filtrarSolicitudesArea('URF')">🧊 URF</button>
    </div>
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-light"><tr><th>Ticket</th><th>Fecha</th><th>Placa</th><th>Conductor</th><th>Ruta</th><th>Urgencia</th><th>Área</th><th>Estado</th><th>Acciones</th></tr></thead>
        <tbody id="tabla-solicitudes"></tbody>
      </table>
    </div>
  </div>
</div>
